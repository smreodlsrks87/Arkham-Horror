<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>아컴 아이콘 폰트 매핑 확인</title>
<style>
  @font-face{ font-family:'ArkhamIcons'; src:url('fonts/arkham-icons.ttf'); }
  body{margin:0;background:#161018;color:#eee;font-family:sans-serif;padding:24px;}
  h1{font-size:18px;}
  .note{font-size:13px;color:#aaa;margin-bottom:16px;line-height:1.6;}
  .grid{display:flex;flex-wrap:wrap;gap:10px;}
  .cell{width:74px;height:92px;background:#221a2e;border:1px solid #443a52;border-radius:8px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
  .sym{font-family:'ArkhamIcons';font-size:34px;color:#fff;line-height:1;}
  .key{font-size:12px;color:#ffd34d;font-family:monospace;}
  .sec{margin:20px 0 8px;font-size:15px;color:#b69bd6;}
  input{padding:6px 8px;font-size:14px;border-radius:5px;border:1px solid #777;background:#222;color:#fff;width:200px;}
  .big{font-family:'ArkhamIcons';font-size:60px;color:#fff;margin-top:10px;min-height:70px;}
</style>
</head>
<body>
  <h1>아컴 아이콘 폰트 매핑 확인</h1>
  <div class="note">
    각 칸의 <b>큰 글자</b>가 그 <b>키(노란색)</b>를 아이콘 폰트로 표시한 모습입니다.<br>
    어느 키에서 해골·전투·의지 같은 심볼이 나오는지 확인해서 알려주세요.<br>
    (fonts/arkham-icons.ttf 가 있어야 보입니다. localhost로 여세요.)
  </div>

  <div class="sec">숫자 0-9</div>
  <div class="grid" id="nums"></div>

  <div class="sec">소문자 a-z</div>
  <div class="grid" id="lower"></div>

  <div class="sec">대문자 A-Z</div>
  <div class="grid" id="upper"></div>

  <div class="sec">기호</div>
  <div class="grid" id="syms"></div>

  <div class="sec">직접 입력해서 확인</div>
  <input id="inp" placeholder="글자 입력" value="skull">
  <div class="big" id="out">skull</div>

<script>
  function make(container, chars){
    const box=document.getElementById(container);
    chars.forEach(ch=>{
      const c=document.createElement("div"); c.className="cell";
      c.innerHTML='<div class="sym">'+ch+'</div><div class="key">'+(ch===" "?"(공백)":ch)+'</div>';
      box.appendChild(c);
    });
  }
  make("nums","0123456789".split(""));
  make("lower","abcdefghijklmnopqrstuvwxyz".split(""));
  make("upper","ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""));
  make("syms","!@#$%^&*()-_=+[]{};:',.<>/?".split(""));
  const inp=document.getElementById("inp"), out=document.getElementById("out");
  inp.addEventListener("input",()=>out.textContent=inp.value);
</script>
</body>
</html>
