<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>캠페인 기록 — Night of the Zealot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  @font-face{ font-family:'ArkhamIcons'; src:url('fonts/arkham-icons.ttf'); }   /* 트라우마 숫자 등 */
  /* 기록지 한글 필기체 — 나눔손글씨 펜 */
  @font-face{ font-family:'Handwriting'; src:url('fonts/NanumPenScript.ttf'); }
  /* 본명조(=Noto Serif KR, 구글폰트) — scenario1과 동일한 나레이션·팝업 폰트 */
  :root{ --ink:#2d3a55; --hand:'Handwriting',"Batang","바탕",serif;
         --serif:'Noto Serif KR','Iowan Old Style','Hoefler Text','맑은 고딕',serif; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#000; display:flex; align-items:center; justify-content:center;
    min-height:100vh; overflow:hidden; font-family:var(--hand);
  }

  /* ───────── PART 2: 캠페인 기록지(배경 1605×903) ───────── */
  #stage2{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity 1.8s ease; pointer-events:none; }
  #stage2.show{ opacity:1; pointer-events:auto; }
  .sheet{
    position:relative;
    width:min(100vw, calc(100vh * 1605 / 903));
    aspect-ratio:1605 / 903;
    background:url("images/notzCampaignLog.png") center/100% 100% no-repeat;
    container-type:inline-size;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
  }
  .f{ position:absolute; font-family:var(--hand);
    color:var(--ink); font-weight:600; line-height:1; white-space:nowrap; transform:translateY(-50%); }
  .fld{ font-size:1.5cqw; }
  .sm { font-size:1.3cqw; }
  .r  { transform:translate(-100%,-50%); }          /* 우측 정렬(경험치=승점 숫자) */
  .c  { transform:translate(-50%,-50%); }           /* 중앙(트라우마 값) */
  .ico{ font-family:var(--hand); color:#7a1f1f; font-weight:600; }  /* 트라우마 = 나눔손글씨 펜(손글씨) */

  /* 손글씨(Campaign Notes) — 살짝 기운 각도 + 한 글자씩 */
  #notes-write{ position:absolute; left:55.4%; top:50.5%; width:18.2cqw;
    transform:rotate(-2deg); transform-origin:left top;
    font-family:var(--hand); color:var(--ink);
    font-size:1.25cqw; line-height:1.7; white-space:pre-wrap; }
  #notes-write .wc{ opacity:0; transition:opacity .18s ease; }
  #notes-write .wc.on{ opacity:1; }
  /* 만년필(이미지 없으면 SVG 폴백) */
  #pen{ position:absolute; width:5.2cqw; height:5.2cqw; z-index:40; pointer-events:none;
    opacity:0; transition:left .12s ease, top .12s ease, opacity .3s ease;
    transform:translate(-4%,-88%); }               /* 펜촉이 글자 위치에 오도록 보정 */
  #pen.show{ opacity:1; }
  #pen img{ width:100%; height:100%; object-fit:contain; }

  /* ───────── PART 1: 나레이션(검은 화면) ───────── */
  #narration{ position:absolute; inset:0; z-index:100; background:#000;
    display:flex; align-items:center; justify-content:center;
    opacity:1; transition:opacity 1.6s ease; }
  #narration.hide{ opacity:0; pointer-events:none; }
  #narr-text{
    width:min(820px,86vw); max-height:82vh;
    font-family:var(--serif);   /* 나레이션 = 본명조(Noto Serif KR) */
    color:#eee7d8; font-size:20px; line-height:2.0; letter-spacing:.01em;
    white-space:pre-wrap; text-align:left; text-shadow:0 0 18px rgba(255,255,255,.05);
  }
  #narr-text .nc{ opacity:0; transition:opacity .4s ease; }
  #narr-text .nc.on{ opacity:1; }
  /* ESC 스킵 게이지(우상단) */
  #narr-skip{ position:absolute; top:26px; right:30px; z-index:110; font-family:var(--serif);
    display:flex; align-items:center; gap:12px; color:rgba(244,242,236,.55); font-size:13px; letter-spacing:.04em; }
  #narr-skip .skip-ring{ transform:rotate(-90deg); }
  #narr-skip .ring-bg{ fill:none; stroke:rgba(255,255,255,.12); stroke-width:2.5; }
  #narr-skip .ring-fg{ fill:none; stroke:#eee7d8; stroke-width:2.5; stroke-linecap:round;
    stroke-dasharray:88; stroke-dashoffset:88; }

  /* ───────── PART 0: 트라우마 선택 팝업 ───────── */
  #trauma-pop{ position:absolute; inset:0; z-index:200; background:rgba(0,0,0,.72);
    display:none; align-items:center; justify-content:center; }
  #trauma-pop.show{ display:flex; }
  /* 트라우마 팝업 — scenario1 팝업과 동일한 폰트(본명조)·크기 */
  .tp-box{ font-family:var(--serif); background:linear-gradient(180deg,#1a1322,#120c1a);
    border:1px solid #6b4d8a; border-radius:14px; padding:26px 34px;
    text-align:center; box-shadow:0 16px 50px rgba(0,0,0,.75); max-width:480px; }
  .tp-box .tp-msg{ color:#e8ddc8; font-size:15px; line-height:1.6; letter-spacing:.02em; margin-bottom:20px; }
  .tp-box .tp-msg b{ color:#c9a86a; font-weight:600; }
  .tp-btns{ display:flex; gap:10px; justify-content:center; }
  .tp-btns button{ font-family:inherit; cursor:pointer; font-size:14px; letter-spacing:.06em; padding:9px 22px; border-radius:8px;
    border:1px solid #4a3a5e; background:#1a1226; color:#e8ddc8; transition:background .15s,border-color .15s; }
  .tp-btns button:hover{ background:#221730; border-color:#6b4d8a; }
  .tp-btns button.primary{ background:#3a2c50; border-color:#8a6db0; }
  .tp-box.tp-danger{ border-color:#8a3030; box-shadow:0 16px 50px rgba(0,0,0,.8), 0 0 26px rgba(180,40,40,.3); }
  .tp-box.tp-danger .tp-msg{ color:#e88; }
  /* 결말 연출 — 경험치 +N 플로트 / 트라우마 등장 / 펜 기입 셀 */
  .xp-plus{ position:absolute; z-index:12; pointer-events:none; font-family:var(--hand); font-weight:800; color:#5fbf6e;
    font-size:2.2cqw; transform:translate(-125%,-10%); animation:xpUp 1.4s ease forwards; text-shadow:0 1px 3px rgba(0,0,0,.6); }
  @keyframes xpUp{ 0%{opacity:0;transform:translate(-125%,15%);} 20%{opacity:1;} 100%{opacity:0;transform:translate(-125%,-70%);} }
  .f.tr-pop{ animation:trPop .9s ease; }
  @keyframes trPop{ 0%{opacity:0;transform:translate(-50%,-50%) scale(.2);} 55%{opacity:1;transform:translate(-50%,-50%) scale(1.35);} 100%{transform:translate(-50%,-50%) scale(1);} }
  .pen-cell{ position:absolute; transform:translateY(-50%); font-family:var(--hand); color:var(--ink);
    font-size:1.3cqw; line-height:1.55; white-space:pre-wrap; z-index:4; }
  .pen-cell.check{ font-size:2.1cqw; color:#3a2f55; transform:translate(-50%,-50%); }
  .pen-cell.earned{ font-size:1.2cqw; }
  .wc{ opacity:0; transition:opacity .18s ease; }   /* 펜 기입 글자(노트·셀 공용) */
  .wc.on{ opacity:1; }
</style>
</head>
<body>
  <!-- PART 2: 기록지 -->
  <div id="stage2">
    <div class="sheet" id="sheet">
      <div id="notes-write"></div>
      <div id="pen"></div>
    </div>
  </div>

  <!-- PART 1: 나레이션 -->
  <div id="narration">
    <div id="narr-text"></div>
    <div id="narr-skip">
      <span class="skip-label">스킵하려면 esc를 길게 누르세요.</span>
      <svg class="skip-ring" width="34" height="34" viewBox="0 0 34 34">
        <circle class="ring-bg" cx="17" cy="17" r="14"></circle>
        <circle class="ring-fg" id="narr-skip-fg" cx="17" cy="17" r="14"></circle>
      </svg>
    </div>
  </div>

  <!-- 결말 팝업(트라우마 선택·정보·예아니오 공용) -->
  <div id="trauma-pop"><div class="tp-box" id="tp-box"></div></div>

  <!-- 소리: 나레이션 음성(결말별) + 연필 -->
  <audio id="narr-audio" preload="auto"></audio>
  <audio id="pencil" src="audio/sfx/pencil.mp3" preload="auto"></audio>

<script type="module">
import { createSkipRing } from "./js/shared/skip-ring.js";

/* ══════════════════════════════════════════════════════════════
   ★ 테스트 시드 — scenario1 없이 이 파일만 열어도 값이 보이도록 미리 주입.
   scenario1→여기 연결이 끝나면 TEST_SEED=false 로 두면 실제 값이 쓰임.
   요청 설정: 결말1, 조사자=데이지 워커, 종료상태[0,3](체력·정신 0 → 트라우마 택1), 승점4.
   ══════════════════════════════════════════════════════════════ */
// 표준 테스트 시드. scenario1에서 넘어온 실제 데이터(arkham_scenario_done)가 있으면 시드 안 함(덮어쓰기 방지).
// 단독 테스트를 강제하려면 URL에 ?test 를 붙인다.
const TEST_SEED = true;
if(TEST_SEED && (location.search.includes("test") || !localStorage.getItem("arkham_scenario_done"))){
  localStorage.setItem("arkham_decks", JSON.stringify([
    { investigator:"01502", investigatorName:"데이지 워커", cards:{}, xp:4,
      trauma:{physical:0,mental:0}, status:[2,0], chosenTrauma:null }   // 결말1 생존 테스트
  ]));
  localStorage.setItem("arkham_player_order", JSON.stringify(["01502"]));
  localStorage.setItem("arkham_campaign", JSON.stringify({ resolutions:[1], notes:[], interrogated:[], gotAway:[], killed:[] }));
}

/* ── localStorage에서 값 읽기/쓰기 ── */
function readDecks(){ try{ return JSON.parse(localStorage.getItem("arkham_decks"))||[]; }catch(_){ return []; } }
function readOrder(){ try{ return JSON.parse(localStorage.getItem("arkham_player_order"))||[]; }catch(_){ return []; } }
function readCampaign(){ try{ return JSON.parse(localStorage.getItem("arkham_campaign"))||{}; }catch(_){ return {}; } }
function saveDecks(){ try{ localStorage.setItem("arkham_decks", JSON.stringify(DECKS)); }catch(_){} }
function saveCampaign(c){ try{ localStorage.setItem("arkham_campaign", JSON.stringify(c)); }catch(_){} }
let DECKS = readDecks();
const CAMP = readCampaign();
// 방금 결말 = 결말 누적 배열의 마지막(전역 번호: s1=0~3, s2=4~7…). 나레이션·노트 선택 기준.
const RESOLUTION = (CAMP.resolutions && CAMP.resolutions.length) ? CAMP.resolutions[CAMP.resolutions.length-1] : 0;

/* 대표조사자부터(조우 뽑는 순서) 좌측 열에 배치 */
function orderedDecks(){
  const order = readOrder();
  const byCode = {}; DECKS.forEach(d=> byCode[d.investigator]=d);
  const out = order.map(c=>byCode[c]).filter(Boolean);
  DECKS.forEach(d=>{ if(!out.includes(d)) out.push(d); });   // 순서에 없던 덱은 뒤에
  return out;
}

/* ── 결말별 나레이션 텍스트(전역 번호) ── 시나리오1=0~3. 시나리오2=4~7, 3=8~11 … 여기에 이어 추가.
   (없는 번호는 narrationPhase가 0으로 폴백) ── */
const NARRATION = {
0:"당신은 간신히 목숨을 건져 집 밖으로 빠져나옵니다. 거실에 있던 여자가 현관문을 닫고 나오며 문을 쾅 소리 나게 닫습니다. \"이 바보들! 무슨 짓을 저질렀는지 알기나 해?\" 그녀는 의자를 문 앞으로 밀어 가져가더니, 등받이를 문손잡이 아래에 끼워 넣어 문을 고정합니다. \"여길 벗어나야 해. 날 따라와. 내가 아는 걸 전부 말해줄 테니까. 저 아래 도사리고 있는 위협이 도시 전체로 퍼져나가는 걸 막을 수 있는 건 우리뿐이야.\" 당신은 반박할 여력이 없습니다. 고개를 끄덕인 당신은 현관을 나서서 비 내리는 거리, 리버타운을 향해 달려가는 여자를 뒤따릅니다.",
1:"당신은 고개를 끄덕이며 붉은 머리의 여자가 집의 벽과 바닥에 불을 지르도록 내버려 둡니다. 불길이 빠르게 번져나가고, 당신은 그 거센 화염에 휩쓸리지 않으려 서둘러 현관문 밖으로 뛰쳐나갑니다. 보도에 서서 당신은 자신의 모든 소유물이 불길에 삼켜지는 모습을 지켜봅니다. “나를 따라와.” 여자가 말합니다. “너희들은 저 아래 도사리고 있는 위협에 대해 알아야만 해. 혼자서는 어렵겠지만… 함께라면 막아낼 수 있어.”",
2:"당신은 여자가 당신의 허락도 없이 집에 불을 지를지도 모른다는 우려 때문에, 여자의 요구를 거절하고 그녀를 집 밖으로 내쫓으려 합니다. \"어리석은 놈들! 너희들은 아주 큰 실수를 저지르고 있어!\" 그녀가 경고합니다. \"너희들은 저 아래 도사리고 있는 위협을, 우리 모두가 엄청난 위험에 처했다는 사실을 전혀 모르고 있다고!\" 오늘 밤 겪은 일로 동요하던 당신은 일단 그녀의 말을 들어보기로 합니다. 어쩌면 그녀가 이 기이한 사건들에 대해 무언가 실마리를 제공해 줄지도 모르니까요... 하지만 그녀는 당신을 별로 신뢰하지 않는 듯합니다.",
3:"집을 빠져나갈 방법을 찾으려 복도로 달려가 보지만, 여전히 뜨겁게 타오르는 장벽이 앞길을 가로막고 있습니다. 꼼짝없이 갇힌 상황에서 집에 침입한 흉포한 괴물 무리가 점점 더 가까이 다가오고, 이제 도망칠 곳은 어디에도 없습니다."
};

/* 결말별 Campaign Notes 인용문(전역 번호). 각 원소 = 한 줄('따옴표'). 여러 줄이면 한 줄 끝나고 1초 뒤 다음 줄. */
const RESOLUTION_NOTES = {
  0:["당신의 집이 아직 그대로 있다.","구울 사제가 아직 살아있다."],
  1:["당신은 집을 불태웠다."],
  2:["당신의 집이 아직 그대로 있다."],
  3:["리타는 자신의 대의를 도와줄 다른 사람들을 찾아야만 했다.","당신의 집이 아직 그대로 있다.","구울 사제가 아직 살아있다."]
};
// 이번 시나리오 노트를 캠페인에 누적(시나리오당 1항목=줄 배열, 재로드 중복 방지) → 누적 줄 배열 반환
function campaignNotesLines(){
  const c = readCampaign(); c.notes = c.notes || []; c.resolutions = c.resolutions || [];
  while(c.notes.length < c.resolutions.length){ c.notes.push(RESOLUTION_NOTES[c.resolutions[c.notes.length]] || []); }
  saveCampaign(c);
  return c.notes.flat();   // 모든 시나리오의 인용문 줄을 순서대로
}

/* ── 좌표(배경 1605×903 기준 %). 각 조사자 열 라벨 좌측 % ── */
const px = (n)=> n/1605*100;
const COL = [25.86, 38.26, 50.65, 63.06];
const ROW = { inv:21.2, xp:25.2, trauma:29.3, earned:35.9 };
const SC_CHECK = [ [32.6,51.8], [32.5,58.4], [32.6,67.6] ];   // 시나리오 체크박스(게더링/미드나잇/디바우어)
const KILLED_POS = [29.6, 79.5], CULT_INT_POS = [56.0, 73.6], CULT_AWAY_POS = [56.0, 87.5];

const sheet = document.getElementById("sheet");
function put(l, t, cls, txt){
  const el=document.createElement("div");
  el.className="f "+cls; el.style.left=l+"%"; el.style.top=t+"%"; el.textContent=txt;
  sheet.appendChild(el); return el;
}

/* ── 기록지 값 채우기(즉시 기록분: 조사자명·남은 경험치·누적 트라우마) ── */
let SHEET = [];   // [{d, cx, xpEl, physicalEl, mentalEl}] — 결말 연출에서 참조
function fillSheet(){
  SHEET = [];
  orderedDecks().slice(0,4).forEach((d,i)=>{
    const cx = COL[i];
    put(cx+px(185), ROW.inv, "fld r", d.investigatorName||"");           // INVESTIGATOR = 조사자명(우측정렬)
    const xpEl = put(cx+px(185), ROW.xp, "fld r", String(d.xp||0));      // UNSPENT EXPERIENCE = 남은 경험치(우측)
    const tr = d.trauma || { physical:0, mental:0 };                     // TRAUMA = 누적(육체/정신 각 수치)
    const physicalEl = tr.physical>0 ? put(cx+px(80),  ROW.trauma, "sm c ico", String(tr.physical)) : null;
    const mentalEl   = tr.mental>0   ? put(cx+px(145), ROW.trauma, "sm c ico", String(tr.mental))   : null;
    SHEET.push({ d, cx, xpEl, physicalEl, mentalEl });
  });
}
// ── 연출은 "표시만"(데이터는 runEpilogue가 미리 확정 저장). 크래시 세이프 ──
// 경험치 카운트업 표시(fromV→toV) + 초록 "+N" 플로트
function showXPGain(entry, fromV, toV, done){
  done=done||function(){};
  const r=entry.xpEl.getBoundingClientRect(), sr=sheet.getBoundingClientRect();
  const f=document.createElement("div"); f.className="xp-plus"; f.textContent="+"+(toV-fromV);
  f.style.left=((r.left-sr.left)/sr.width*100)+"%"; f.style.top=((r.top-sr.top)/sr.height*100)+"%";
  sheet.appendChild(f);
  const steps=12, dt=75; let i=0;
  const iv=setInterval(()=>{ i++; entry.xpEl.textContent=String(Math.round(fromV+(toV-fromV)*i/steps));
    if(i>=steps){ clearInterval(iv); entry.xpEl.textContent=String(toV); setTimeout(()=>{ f.remove(); done(); }, 450); } }, dt);
}
// 전원 +delta 표시(before 스냅샷 기준)
function showAllXP(before, delta, done){ let i=0; (function next(){ if(i>=SHEET.length){ done(); return; }
  const k=i++; showXPGain(SHEET[k], before[k].xp, before[k].xp+delta, next); })(); }
// 트라우마 칸을 toCount로 표시(있으면 갱신, 없으면 생성) — 데이터는 이미 확정됨
function showTrauma(entry, which, toCount, done){
  done=done||function(){};
  const key = which==="physical" ? "physicalEl" : "mentalEl";
  const l = which==="physical" ? entry.cx+px(80) : entry.cx+px(145);
  if(entry[key]){ entry[key].textContent=String(toCount); entry[key].classList.remove("tr-pop"); void entry[key].offsetWidth; entry[key].classList.add("tr-pop"); }
  else { entry[key] = put(l, ROW.trauma, "sm c ico tr-pop", String(toCount)); }
  const el=entry[key]; setTimeout(()=>{ if(el) el.classList.remove("tr-pop"); done(); }, 900);
}
// 이번 시나리오 결과(status)를 누적 트라우마에 반영 → status 초기화(재적용·팝업 재발 방지) → 저장
function applyScenarioTrauma(){
  DECKS.forEach(d=>{
    d.trauma = d.trauma || { physical:0, mental:0 };
    const st = d.status || [2,0];
    if(st[0]===0){   // 쓰러짐 → 트라우마 1
      const which = st[1]===1 ? "physical" : st[1]===2 ? "mental"
                  : (d.chosenTrauma==="mental" ? "mental" : "physical");   // 3=둘 다 → 택1
      d.trauma[which] = (d.trauma[which]||0) + 1;
    }
    d.status = [2,0];   // 처리 완료
  });
  saveDecks();
}

/* ══ 공용 팝업(트라우마 선택·정보·예아니오) ══ */
function showLogPopup(html, buttons, opts){
  opts = opts||{};
  const pop=document.getElementById("trauma-pop"), box=document.getElementById("tp-box");
  box.classList.toggle("tp-danger", !!opts.danger);
  box.innerHTML = '<div class="tp-msg">'+html+'</div><div class="tp-btns"></div>';
  const bw=box.querySelector(".tp-btns");
  buttons.forEach(b=>{ const el=document.createElement("button"); el.textContent=b.label; if(b.primary) el.className="primary"; el.onclick=()=>b.act&&b.act(); bw.appendChild(el); });
  pop.classList.add("show");
}
function hideLogPopup(){ document.getElementById("trauma-pop").classList.remove("show"); }
function popupInfo(html, opts){ return new Promise(res=> showLogPopup(html, [{label:"확인", primary:true, act:()=>{ hideLogPopup(); res(); }}], opts)); }
function popupYesNo(html){ return new Promise(res=> showLogPopup(html, [
  {label:"아니오", act:()=>{ hideLogPopup(); res(false); }},
  {label:"예", primary:true, act:()=>{ hideLogPopup(); res(true); }} ])); }

/* ══ PART 0: 트라우마 선택 팝업(둘 다 0으로 쓰러진 조사자, 순서대로·정지) ══ */
function traumaPhase(){
  const need = orderedDecks().filter(d=> (d.status||[])[0]===0 && (d.status||[])[1]===3);
  return new Promise(resolve=>{
    let i=0;
    (function next(){
      if(i>=need.length){ hideLogPopup(); resolve(); return; }
      const d=need[i];
      showLogPopup("<b>"+(d.investigatorName||"조사자")+"</b> — 체력과 정신력이 모두 0이 되어 쓰러졌습니다.<br>어떤 트라우마를 받겠습니까?",
        [{label:"육체 트라우마", act:()=>{ d.chosenTrauma="physical"; i++; next(); }},
         {label:"정신 트라우마", act:()=>{ d.chosenTrauma="mental";   i++; next(); }}]);
    })();
  });
}

/* ══ PART 1: 나레이션(한 글자씩, 자리 미리 고정 → 안 밀림) ══ */
let narrGen = 0, narrDone = false, narrSpansRef = [];
// 좌클릭 → 나레이션 전체 텍스트 즉시 노출(넘어가진 않음; 다 읽고 ESC 길게로 스킵)
document.getElementById("narration").addEventListener("mousedown", (e)=>{
  if(e.button!==0 || document.getElementById("narration").classList.contains("hide")) return;
  narrSpansRef.forEach(s=> s.classList.add("on"));
});
const skip = createSkipRing({
  ringEl: document.getElementById("narr-skip-fg"),
  holdMs: 1000,
  isDone: ()=> narrDone,
  onComplete: ()=> finishNarration(),
});
function narrationPhase(){
  return new Promise(resolve=>{
    narrGen++; const gen=narrGen; narrDone=false;
    const box=document.getElementById("narr-text");
    const text=NARRATION[RESOLUTION] || NARRATION[0];
    box.innerHTML="";
    // 모든 글자를 미리 span으로 깔아 자리 확보(opacity만 0→1) → 줄바꿈돼도 위로 안 밀림
    const spans=[...text].map(ch=>{ const s=document.createElement("span"); s.className="nc"; s.textContent=ch; box.appendChild(s); return s; });
    narrSpansRef=spans;   // 좌클릭 노출 대상
    // 음성(파일 있으면 재생, 없으면 무음)
    const au=document.getElementById("narr-audio");
    au.src="cutscenes/ending"+RESOLUTION+".mp3";
    au.onerror=()=>{}; try{ au.currentTime=0; au.play().catch(()=>{}); }catch(_){}
    const TOTAL=40000, per=TOTAL/spans.length;   // 일괄 40초
    skip.enable();
    let k=0;
    (function step(){
      if(gen!==narrGen) return;                  // 스킵/재시작되면 중단
      if(k>=spans.length){ setTimeout(()=>finishNarration(), 1500); return; }
      spans[k].classList.add("on"); k++;
      setTimeout(step, per);
    })();
    finishNarration = ()=>{
      if(narrDone) return; narrDone=true; narrGen++;
      skip.disable();
      spans.forEach(s=>s.classList.add("on"));   // 스킵 시 즉시 완성
      try{ au.pause(); }catch(_){}
      document.getElementById("narration").classList.add("hide");
      setTimeout(resolve, 1300);                 // 페이드아웃 후 다음 파트
    };
  });
}
let finishNarration = ()=>{};   // narrationPhase 안에서 실제 구현 주입

/* ══ PART 2: 기록지 페이드인 + Campaign Notes 손글씨 ══ */
function sheetPhase(){
  document.getElementById("stage2").classList.add("show");
  setTimeout(()=> runEpilogue(), 1800);   // 밝아진 뒤 결말 시퀀스(팝업·경험치/트라우마 연출·노트·리타·체크)
}

/* 만년필 이미지(있으면 사용) 준비 — 없으면 SVG 폴백 */
function initPen(){
  const pen=document.getElementById("pen");
  const SVG='<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'
    +'<g transform="rotate(38 50 50)">'
    +'<rect x="44" y="6" width="12" height="60" rx="4" fill="#1c2233"/>'
    +'<rect x="44" y="6" width="12" height="16" rx="4" fill="#c8a24a"/>'
    +'<polygon points="44,66 56,66 50,92" fill="#c9ccd6"/>'
    +'<rect x="49" y="66" width="2" height="20" fill="#3a3f4c"/>'
    +'</g></svg>';
  pen.innerHTML=SVG;
  const img=new Image();
  img.onload=()=>{ pen.innerHTML='<img src="images/pen.png" alt="">'; };  // 실제 이미지 있으면 교체
  img.src="images/pen.png";
}

// 임의 컨테이너에 펜으로 줄 단위 기입. 한 줄 다 쓰면 연필 멈추고 1초 쉼 → 다음 줄. onDone=전부 끝나면.
function penWrite(wrap, lines, onDone){
  onDone = onDone || function(){};
  const pen=document.getElementById("pen");
  wrap.innerHTML="";
  if(!lines || !lines.length){ onDone(); return; }
  // 각 줄을 블록(div.nline)으로 미리 배치 → 자리 확보(글자는 opacity로만 노출)
  const lineSpans = lines.map(ln=>{
    const div=document.createElement("div"); div.className="nline";
    const spans=[...ln].map(ch=>{ const s=document.createElement("span"); s.className="wc"; s.textContent=ch; div.appendChild(s); return s; });
    wrap.appendChild(div); return spans;
  });

  const pencil=document.getElementById("pencil");
  let writing=true;
  pencil.onended=()=>{ if(writing){ try{ pencil.currentTime=0; pencil.play().catch(()=>{}); }catch(_){} } };
  const penOn=()=>{ writing=true; try{ pencil.currentTime=0; pencil.play().catch(()=>{}); }catch(_){} };
  const penOff=()=>{ writing=false; try{ pencil.pause(); }catch(_){} };
  penOn(); pen.classList.add("show");

  const PER=140, LINE_GAP=1000;   // 글자당 ms, 줄 사이 쉼(ms)
  let li=0, ci=0;
  (function step(){
    if(li>=lineSpans.length){ penOff(); setTimeout(()=>pen.classList.remove("show"), 400); onDone(); return; }
    const line=lineSpans[li];
    if(ci>=line.length){ li++; ci=0; penOff(); setTimeout(()=>{ penOn(); step(); }, LINE_GAP); return; }   // 줄 끝 → 1초 쉼
    const s=line[ci]; s.classList.add("on");
    const cr=s.getBoundingClientRect(), sr2=sheet.getBoundingClientRect();
    pen.style.left=((cr.left+cr.width*0.5 - sr2.left)/sr2.width*100)+"%";
    pen.style.top =((cr.top - sr2.top)/sr2.height*100)+"%";
    ci++;
    setTimeout(step, PER);
  })();
}
function writeNotes(lines, onDone){ penWrite(document.getElementById("notes-write"), lines, onDone); }
// 시트 임의 위치에 새 셀을 만들어 펜으로 기입(리타 이름·킬드·컬티스트·체크 등)
function penWriteAt(l, t, lines, cls, onDone){
  const c=document.createElement("div"); c.className="pen-cell "+(cls||""); c.style.left=l+"%"; c.style.top=t+"%";
  sheet.appendChild(c); penWrite(c, lines, onDone);
}
const pW = (l,t,lines,cls)=> new Promise(r=> penWriteAt(l,t,lines,cls,r));   // await용
const wN = (lines)=> new Promise(r=> writeNotes(lines, r));

/* ══ 결말 시퀀스 엔진 ══ */
function leadEntry(){ return SHEET[0]; }
function leadName(){ return (SHEET[0] && SHEET[0].d.investigatorName) || "조사자"; }
async function runEpilogue(){
  const res = RESOLUTION;
  // 재로드 보상 중복 방지 — 이 시나리오 정산이 이미 됐으면 다시 적용하지 않음(시트는 이미 적용값 표시)
  const c0 = readCampaign(); const scCount = (c0.resolutions||[]).length;
  if((c0.rewarded||0) >= scCount) return;

  // ── 보상 데이터를 먼저 "확정 저장"(크래시 세이프) → 이후 연출은 값을 보여주기만 ──
  const before = SHEET.map(e=>({ xp: e.d.xp||0, mental:(e.d.trauma&&e.d.trauma.mental)||0 }));   // 연출용 시작값 스냅샷
  if(res!==3){
    SHEET.forEach(e=>{ e.d.xp=(e.d.xp||0)+2; });                                                  // 전원 +2
    if(res===2 && SHEET[0]) SHEET[0].d.xp += 1;                                                    // 결말2 대표 +1
    if(res===1 && SHEET[0]){ const t=SHEET[0].d.trauma||(SHEET[0].d.trauma={physical:0,mental:0}); t.mental=(t.mental||0)+1; }  // 결말1 대표 정신 트라우마 +1
  }
  saveDecks();                          // 보상 확정
  c0.rewarded = scCount; saveCampaign(c0);
  const notes = campaignNotesLines();

  if(res===3){   // 전멸 → 캠페인 종료(시나리오1: 후퇴 불가라 전원 사망)
    await wN(notes);
    await pW(KILLED_POS[0], KILLED_POS[1], orderedDecks().map(d=>d.investigatorName||""), "killed");   // 죽거나 미친 조사자
    await popupInfo("이야기가 결말을 맞이했습니다.<br>모든 조사자가 사망하고, 진실은 어둠 속에 묻혔습니다.", {danger:true});
    ["arkham_decks","arkham_campaign","arkham_player_order","arkham_scenario_done"].forEach(k=>localStorage.removeItem(k));   // 캠페인 초기화
    location.href = "arkham_game.html";
    return;
  }

  // 생존(0/1/2) — 연출은 확정된 값을 표시만
  await popupInfo("모든 조사자들은 신화 속 숨겨진 세계에 대한 통찰을 얻었다.");
  await new Promise(r=> showAllXP(before, 2, r));               // 전원 +2 표시
  if(res===2){
    await popupInfo("<b>"+leadName()+"</b>는 자신의 삶을 파괴할 뻔한 간밤의 사건에 저항했다.");
    await new Promise(r=> showXPGain(SHEET[0], before[0].xp+2, before[0].xp+3, r));   // 대표 +1 표시
  }
  await wN(notes);                                             // Campaign Notes 인용문(줄 단위)
  if(res===1){
    await popupInfo("<b>"+leadName()+"</b>은(는) 자신의 집이 불에 타 잿더미가 되는 것을 목격하며 정신적 트라우마를 입습니다.");
    await new Promise(r=> showTrauma(SHEET[0], "mental", before[0].mental+1, r));   // 대표 정신 트라우마 표시
  }
  // 컬티스트(있으면 — 시나리오1은 없음)
  if(CAMP.interrogated && CAMP.interrogated.length) await pW(CULT_INT_POS[0], CULT_INT_POS[1], CAMP.interrogated, "cult");
  if(CAMP.gotAway && CAMP.gotAway.length)          await pW(CULT_AWAY_POS[0], CULT_AWAY_POS[1], CAMP.gotAway, "cult");
  // Earned story asset — 결말 0·1: 대표에게 리타 합류 여부
  if(res===0 || res===1){
    const yes = await popupYesNo("리타 챈들러가 동료로 합류합니다.<br>덱에 추가하시겠습니까?");
    if(yes){
      const d=leadEntry().d; d.cards=d.cards||{}; d.cards["01117"]=(d.cards["01117"]||0)+1; saveDecks();
      await pW(COL[0]+0.5, ROW.earned, ["리타 챈들러"], "earned");
    }
  }
  // 방금 클리어한 시나리오 체크
  const sc = SC_CHECK[Math.floor(res/4)] || SC_CHECK[0];
  await pW(sc[0], sc[1], ["✔"], "check");
  // (경험치 정산 페이지는 다음 단계)
}

/* ── 부팅: 값 기록 → (트라우마 선택) → 나레이션 → 기록지 ── */
async function boot(){
  initPen();
  await traumaPhase();         // [0,3] 조사자 트라우마 택1(정지) → 선택값(chosenTrauma) 확정
  applyScenarioTrauma();       // 이번 결과를 누적 트라우마에 반영 + status 초기화 + 저장
  fillSheet();                 // 조사자명·남은 경험치·누적 트라우마 즉시 기록(기록지는 아직 숨김)
  await narrationPhase();      // 결말 나레이션(40초, ESC 길게 스킵)
  sheetPhase();                // 기록지 페이드인 + 손글씨(누적 캠페인 노트)
}
boot();
</script>
