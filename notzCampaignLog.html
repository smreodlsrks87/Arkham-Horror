<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>캠페인 기록 — Night of the Zealot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/campaign-log.css">
</head>
<body>
  <!-- PART 2: 기록지 -->
  <div id="stage2">
    <div class="sheet" id="sheet">
      <div id="notes-write"></div>
      <div id="pen"></div>
    </div>
  </div>

  <!-- PART 1: 나레이션 -->
  <div id="narration">
    <div id="narr-text"></div>
    <div id="narr-skip">
      <span class="skip-label">스킵하려면 esc를 길게 누르세요.</span>
      <svg class="skip-ring" width="34" height="34" viewBox="0 0 34 34">
        <circle class="ring-bg" cx="17" cy="17" r="14"></circle>
        <circle class="ring-fg" id="narr-skip-fg" cx="17" cy="17" r="14"></circle>
      </svg>
    </div>
  </div>

  <!-- 결말 팝업(트라우마 선택·정보·예아니오 공용) -->
  <div id="trauma-pop"><div class="tp-box" id="tp-box"></div></div>

  <!-- 소리: 나레이션 음성(결말별) + 연필 -->
  <audio id="narr-audio" preload="auto"></audio>
  <audio id="pencil" src="audio/sfx/pencil.mp3" preload="auto"></audio>

<script type="module">
import { createSkipRing } from "./js/shared/skip-ring.js";
import { LS_DECKS, LS_ORDER, LS_CAMPAIGN, LS_DONE,
         readCampaign, saveCampaign, saveDecks, initDecks, orderedDecks } from "./js/campaign/storage.js";
import { initPen, pW, wN } from "./js/campaign/pen.js";
import { COL, ROW, SC_CHECK, KILLED_POS, CULT_INT_POS, CULT_AWAY_POS,
         SHEET, fillSheet, showXPGain, showAllXP, showTrauma, applyScenarioTrauma } from "./js/campaign/sheet.js";

/* 전역 UX — 우클릭 메뉴·이미지 드래그 등 브라우저 기본 상호작용 차단 (모든 화면 공통 지침, scenario1과 동일) */
window.addEventListener("contextmenu", e=> e.preventDefault());
window.addEventListener("dragstart", e=>{ if(e.target && e.target.tagName==="IMG") e.preventDefault(); });

/* ══════════════════════════════════════════════════════════════
   ★ 테스트 시드 — scenario1 없이 이 파일만 열어도 값이 보이도록 미리 주입.
   scenario1→여기 연결이 끝나면 TEST_SEED=false 로 두면 실제 값이 쓰임.
   요청 설정: 결말1, 조사자=데이지 워커, 종료상태[0,3](체력·정신 0 → 트라우마 택1), 승점4.
   ══════════════════════════════════════════════════════════════ */
// 표준 테스트 시드. scenario1에서 넘어온 실제 데이터(arkham_scenario_done)가 있으면 시드 안 함(덮어쓰기 방지).
// 단독 테스트를 강제하려면 URL에 ?test 를 붙인다.
const TEST_SEED = true;
if(TEST_SEED && (location.search.includes("test") || !localStorage.getItem(LS_DONE))){
  localStorage.setItem(LS_DECKS, JSON.stringify([
    { investigator:"01502", investigatorName:"데이지 워커", cards:{}, xp:4,
      trauma:{physical:0,mental:0}, status:[2,0], chosenTrauma:null }   // 결말1 생존 테스트
  ]));
  localStorage.setItem(LS_ORDER, JSON.stringify(["01502"]));
  localStorage.setItem(LS_CAMPAIGN, JSON.stringify({ resolutions:[1], notes:[], interrogated:[], gotAway:[], killed:[] }));
}

initDecks();   // 덱 읽기(storage) — TEST_SEED가 씨를 뿌린 "뒤"여야 하므로 여기서 호출
const CAMP = readCampaign();
// 방금 결말 = 결말 누적 배열의 마지막(전역 번호: s1=0~3, s2=4~7…). 나레이션·노트 선택 기준.
const RESOLUTION = (CAMP.resolutions && CAMP.resolutions.length) ? CAMP.resolutions[CAMP.resolutions.length-1] : 0;

/* ── 결말별 나레이션 텍스트(전역 번호) ── 시나리오1=0~3. 시나리오2=4~7, 3=8~11 … 여기에 이어 추가.
   (없는 번호는 narrationPhase가 0으로 폴백) ── */
const NARRATION = {
0:"당신은 간신히 목숨을 건져 집 밖으로 빠져나옵니다.\n\n거실에 있던 여자가 현관문을 닫고 나오며 문을 쾅 소리 나게 닫습니다. \"이 바보들! 무슨 짓을 저질렀는지 알기나 해?\" 그녀는 의자를 문 앞으로 밀어 가져가더니, 등받이를 문 손잡이 아래에 끼워 넣어 문을 고정합니다. \"여길 벗어나야 해. 날 따라와. 내가 아는 걸 전부 말해줄 테니까. 저 아래 도사리고 있는 위협이 도시 전체로 퍼져나가는 걸 막을 수 있는 건 우리뿐이야.\"\n\n당신은 반박할 여력이 없습니다. 고개를 끄덕인 당신은 현관을 나서서 비 내리는 거리, 리버타운을 향해 달려가는 여자를 뒤따릅니다.",
1:"당신은 고개를 끄덕이며 붉은 머리의 여자가 집의 벽과 바닥에 불을 지르도록 내버려 둡니다. 불길이 빠르게 번져나가고, 당신은 그 거센 화염에 휩쓸리지 않으려 서둘러 현관문 밖으로 뛰쳐나갑니다. 보도에 서서 당신은 자신의 모든 소유물이 불길에 삼켜지는 모습을 지켜봅니다. “나를 따라와.” 여자가 말합니다. “너희들은 저 아래 도사리고 있는 위협에 대해 알아야만 해. 혼자서는 어렵겠지만… 함께라면 막아낼 수 있어.”",
2:"당신은 여자가 당신의 허락도 없이 집에 불을 지를지도 모른다는 우려 때문에, 여자의 요구를 거절하고 그녀를 집 밖으로 내쫓으려 합니다. \"어리석은 놈들! 너희들은 아주 큰 실수를 저지르고 있어!\" 그녀가 경고합니다. \"너희들은 저 아래 도사리고 있는 위협을, 우리 모두가 엄청난 위험에 처했다는 사실을 전혀 모르고 있다고!\" 오늘 밤 겪은 일로 동요하던 당신은 일단 그녀의 말을 들어보기로 합니다. 어쩌면 그녀가 이 기이한 사건들에 대해 무언가 실마리를 제공해 줄지도 모르니까요... 하지만 그녀는 당신을 별로 신뢰하지 않는 듯합니다.",
3:"집을 빠져나갈 방법을 찾으려 복도로 달려가 보지만, 여전히 뜨겁게 타오르는 장벽이 앞길을 가로막고 있습니다. 꼼짝없이 갇힌 상황에서 집에 침입한 흉포한 괴물 무리가 점점 더 가까이 다가오고, 이제 도망칠 곳은 어디에도 없습니다."
};

/* 결말별 텍스트 출력 시간(ms). 지정 없으면 40초. 출력 종료 후 자동으로 다음 화면(arkham_game 프롤로그와 동일한 자동 전환). */
const NARR_TOTAL = { 0:44500 };   // 결말0: 44.5초 출력
/* 출력 종료 → 자동 전환까지 간격(ms). 지정 없으면 2000. */
const NARR_ADVANCE_GAP = { 0:1500 };   // 결말0: 44.5초 출력 → 46초에 전환(간격 1.5초)

/* 결말별 Campaign Notes 인용문(전역 번호). 각 원소 = 한 줄('따옴표'). 여러 줄이면 한 줄 끝나고 1초 뒤 다음 줄. */
const RESOLUTION_NOTES = {
  0:["당신의 집이 아직 그대로 있다.","구울 사제가 아직 살아있다."],
  1:["당신은 집을 불태웠다."],
  2:["당신의 집이 아직 그대로 있다."],
  3:["리타는 자신의 대의를 도와줄 다른 사람들을 찾아야만 했다.","당신의 집이 아직 그대로 있다.","구울 사제가 아직 살아있다."]
};
// 이번 시나리오 노트를 캠페인에 누적(시나리오당 1항목=줄 배열, 재로드 중복 방지) → 누적 줄 배열 반환
function campaignNotesLines(){
  const c = readCampaign(); c.notes = c.notes || []; c.resolutions = c.resolutions || [];
  while(c.notes.length < c.resolutions.length){ c.notes.push(RESOLUTION_NOTES[c.resolutions[c.notes.length]] || []); }
  saveCampaign(c);
  return c.notes.flat();   // 모든 시나리오의 인용문 줄을 순서대로
}

/* ══ 공용 팝업(트라우마 선택·정보·예아니오) ══ */
function showLogPopup(html, buttons, opts){
  opts = opts||{};
  const pop=document.getElementById("trauma-pop"), box=document.getElementById("tp-box");
  box.classList.toggle("tp-danger", !!opts.danger);
  box.innerHTML = '<div class="tp-msg">'+html+'</div><div class="tp-btns"></div>';
  const bw=box.querySelector(".tp-btns");
  buttons.forEach(b=>{ const el=document.createElement("button"); el.textContent=b.label; if(b.primary) el.className="primary"; el.onclick=()=>b.act&&b.act(); bw.appendChild(el); });
  pop.classList.add("show");
}
function hideLogPopup(){ document.getElementById("trauma-pop").classList.remove("show"); }
function popupInfo(html, opts){ return new Promise(res=> showLogPopup(html, [{label:"확인", primary:true, act:()=>{ hideLogPopup(); res(); }}], opts)); }
function popupYesNo(html){ return new Promise(res=> showLogPopup(html, [
  {label:"아니오", act:()=>{ hideLogPopup(); res(false); }},
  {label:"예", primary:true, act:()=>{ hideLogPopup(); res(true); }} ])); }

/* ══ PART 0: 트라우마 선택 팝업(둘 다 0으로 쓰러진 조사자, 순서대로·정지) ══ */
function traumaPhase(){
  const need = orderedDecks().filter(d=> (d.status||[])[0]===0 && (d.status||[])[1]===3);
  return new Promise(resolve=>{
    let i=0;
    (function next(){
      if(i>=need.length){ hideLogPopup(); resolve(); return; }
      const d=need[i];
      showLogPopup("<b>"+(d.investigatorName||"조사자")+"</b> — 체력과 정신력이 모두 0이 되어 쓰러졌습니다.<br>어떤 트라우마를 받겠습니까?",
        [{label:"육체 트라우마", act:()=>{ d.chosenTrauma="physical"; i++; next(); }},
         {label:"정신 트라우마", act:()=>{ d.chosenTrauma="mental";   i++; next(); }}]);
    })();
  });
}

/* ══ PART 1: 나레이션(한 글자씩, 자리 미리 고정 → 안 밀림) ══ */
let narrGen = 0, narrDone = false, narrSpansRef = [];
// 좌클릭 → 나레이션 전체 텍스트 즉시 노출(넘어가진 않음; 다 읽고 ESC 길게로 스킵)
document.getElementById("narration").addEventListener("mousedown", (e)=>{
  if(e.button!==0 || document.getElementById("narration").classList.contains("hide")) return;
  narrSpansRef.forEach(s=> s.classList.add("on"));
});
const skip = createSkipRing({
  ringEl: document.getElementById("narr-skip-fg"),
  holdMs: 1000,
  isDone: ()=> narrDone,
  onComplete: ()=> finishNarration(),
});
function narrationPhase(){
  return new Promise(resolve=>{
    narrGen++; const gen=narrGen; narrDone=false;
    const box=document.getElementById("narr-text");
    const text=NARRATION[RESOLUTION] || NARRATION[0];
    box.innerHTML="";
    // 모든 글자를 미리 span으로 깔아 자리 확보(opacity만 0→1) → 줄바꿈돼도 위로 안 밀림
    const spans=[...text].map(ch=>{ const s=document.createElement("span"); s.className="nc"; s.textContent=ch; box.appendChild(s); return s; });
    narrSpansRef=spans;   // 좌클릭 노출 대상
    // 음성(파일 있으면 재생, 없으면 무음)
    const au=document.getElementById("narr-audio");
    au.src="cutscenes/ending"+RESOLUTION+".mp3";
    au.onerror=()=>{}; try{ au.currentTime=0; au.play().catch(()=>{}); }catch(_){}
    const TOTAL = NARR_TOTAL[RESOLUTION] || 40000, per=TOTAL/spans.length;   // 결말별 출력 시간(없으면 40초)
    skip.enable();
    let k=0;
    (function step(){
      if(gen!==narrGen) return;                  // 스킵/재시작되면 중단
      if(k>=spans.length){ armContinue(); return; }   // 출력 완료 → "계속" 안내 표시 + 2초 뒤 자동 전환(armContinue가 처리)
      spans[k].classList.add("on"); k++;
      setTimeout(step, per);
    })();
    finishNarration = ()=>{
      if(narrDone) return; narrDone=true; narrGen++;
      skip.disable();
      spans.forEach(s=>s.classList.add("on"));   // 스킵 시 즉시 완성
      try{ au.pause(); }catch(_){}
      document.getElementById("narration").classList.add("hide");
      setTimeout(resolve, 1300);                 // 페이드아웃 후 다음 파트
    };
  });
}
let finishNarration = ()=>{};   // narrationPhase 안에서 실제 구현 주입

// 나레이션 출력 완료 → 우상단 "스킵하려면 esc를 길게" 안내를 "계속하려면 아무거나 누르세요"로 바꾸고
// 아무 키·클릭이면 다음 파트로 넘어감(arkham_game 나레이션과 동일한 대기 방식).
function armContinue(){
  skip.disable();
  const lbl=document.querySelector("#narr-skip .skip-label");
  if(lbl) lbl.textContent="계속하려면 아무거나 누르세요";
  const ring=document.querySelector("#narr-skip .skip-ring");
  if(ring) ring.style.display="none";   // ESC 길게 게이지 숨김(이제 아무거나로 넘어감)
  const go=()=>{
    if(narrAutoTimer){ clearTimeout(narrAutoTimer); narrAutoTimer=null; }
    document.removeEventListener("keydown", go, true);
    document.removeEventListener("mousedown", go, true);
    finishNarration();
  };
  document.addEventListener("keydown", go, true);
  document.addEventListener("mousedown", go, true);
  // 출력 종료 후 자동으로 다음 화면(그동안 안내 표시 → 넘어가며 사라짐). 아무거나 누르면 즉시.
  narrAutoTimer = setTimeout(go, NARR_ADVANCE_GAP[RESOLUTION] || 2000);
}
let narrAutoTimer=null;

/* ══ PART 2: 기록지 페이드인 + Campaign Notes 손글씨 ══ */
function sheetPhase(){
  document.getElementById("stage2").classList.add("show");
  setTimeout(()=> runEpilogue(), 1800);   // 밝아진 뒤 결말 시퀀스(팝업·경험치/트라우마 연출·노트·리타·체크)
}

/* ══ 결말 시퀀스 엔진 ══ */
function leadEntry(){ return SHEET[0]; }
function leadName(){ return (SHEET[0] && SHEET[0].d.investigatorName) || "조사자"; }
async function runEpilogue(){
  const res = RESOLUTION;
  // 재로드 보상 중복 방지 — 이 시나리오 정산이 이미 됐으면 다시 적용하지 않음(시트는 이미 적용값 표시)
  const c0 = readCampaign(); const scCount = (c0.resolutions||[]).length;
  if((c0.rewarded||0) >= scCount) return;

  // ── 보상 데이터를 먼저 "확정 저장"(크래시 세이프) → 이후 연출은 값을 보여주기만 ──
  const before = SHEET.map(e=>({ xp: e.d.xp||0, mental:(e.d.trauma&&e.d.trauma.mental)||0 }));   // 연출용 시작값 스냅샷
  if(res!==3){
    SHEET.forEach(e=>{ e.d.xp=(e.d.xp||0)+2; });                                                  // 전원 +2
    if(res===2 && SHEET[0]) SHEET[0].d.xp += 1;                                                    // 결말2 대표 +1
    if(res===1 && SHEET[0]){ const t=SHEET[0].d.trauma||(SHEET[0].d.trauma={physical:0,mental:0}); t.mental=(t.mental||0)+1; }  // 결말1 대표 정신 트라우마 +1
  }
  saveDecks();                          // 보상 확정
  c0.rewarded = scCount; saveCampaign(c0);
  const notes = campaignNotesLines();

  if(res===3){   // 전멸 → 캠페인 종료(시나리오1: 후퇴 불가라 전원 사망)
    await wN(notes);
    await pW(KILLED_POS[0], KILLED_POS[1], orderedDecks().map(d=>d.investigatorName||""), "killed");   // 죽거나 미친 조사자
    await popupInfo("이야기가 결말을 맞이했습니다.<br>모든 조사자가 사망하고, 진실은 어둠 속에 묻혔습니다.", {danger:true});
    [LS_DECKS, LS_CAMPAIGN, LS_ORDER, LS_DONE].forEach(k=>localStorage.removeItem(k));   // 캠페인 초기화
    location.href = "arkham_game.html";
    return;
  }

  // 생존(0/1/2) — 연출은 확정된 값을 표시만
  await popupInfo("모든 조사자들은 신화 속 숨겨진 세계에 대한 통찰을 얻었다.");
  await new Promise(r=> showAllXP(before, 2, r));               // 전원 +2 표시
  if(res===2){
    await popupInfo("<b>"+leadName()+"</b>는 자신의 삶을 파괴할 뻔한 간밤의 사건에 저항했다.");
    await new Promise(r=> showXPGain(SHEET[0], before[0].xp+2, before[0].xp+3, r));   // 대표 +1 표시
  }
  await wN(notes);                                             // Campaign Notes 인용문(줄 단위)
  if(res===1){
    await popupInfo("<b>"+leadName()+"</b>은(는) 자신의 집이 불에 타 잿더미가 되는 것을 목격하며 정신적 트라우마를 입습니다.");
    await new Promise(r=> showTrauma(SHEET[0], "mental", before[0].mental+1, r));   // 대표 정신 트라우마 표시
  }
  // 컬티스트(있으면 — 시나리오1은 없음)
  if(CAMP.interrogated && CAMP.interrogated.length) await pW(CULT_INT_POS[0], CULT_INT_POS[1], CAMP.interrogated, "cult");
  if(CAMP.gotAway && CAMP.gotAway.length)          await pW(CULT_AWAY_POS[0], CULT_AWAY_POS[1], CAMP.gotAway, "cult");
  // Earned story asset — 결말 0·1: 대표에게 리타 합류 여부
  if(res===0 || res===1){
    const yes = await popupYesNo("리타 챈들러가 동료로 합류합니다.<br>덱에 추가하시겠습니까?");
    if(yes){
      const d=leadEntry().d; d.cards=d.cards||{}; d.cards["01117"]=(d.cards["01117"]||0)+1; saveDecks();
      await pW(COL[0]+0.5, ROW.earned, ["리타 챈들러"], "earned");
    }
  }
  // 방금 클리어한 시나리오 체크
  const sc = SC_CHECK[Math.floor(res/4)] || SC_CHECK[0];
  await pW(sc[0], sc[1], ["✔"], "check");
  // (경험치 정산 페이지는 다음 단계)
}

/* ── 부팅: 값 기록 → (트라우마 선택) → 나레이션 → 기록지 ── */
async function boot(){
  initPen();
  await traumaPhase();         // [0,3] 조사자 트라우마 택1(정지) → 선택값(chosenTrauma) 확정
  applyScenarioTrauma();       // 이번 결과를 누적 트라우마에 반영 + status 초기화 + 저장
  fillSheet();                 // 조사자명·남은 경험치·누적 트라우마 즉시 기록(기록지는 아직 숨김)
  await narrationPhase();      // 결말 나레이션(40초, ESC 길게 스킵)
  sheetPhase();                // 기록지 페이드인 + 손글씨(누적 캠페인 노트)
}
boot();
</script>
